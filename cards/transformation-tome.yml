  ja: |-
    「変化の書」は、2枚同時にしか使えない。（効果は、2枚で1回はたらく。）



    自分のトラッシュからたねポケモンを1枚選び、自分の場のたねポケモン1匹と入れ替える（ついているカード・ダメカン・特殊状態・効果などは、すべて引きつぐ）。入れ替えたポケモンはトラッシュする。

    グッズは、自分の番に何枚でも使える。
  en: |-
    Transformation Tome Trainer - Item

    You must play 2 Transformation Tome cards at once. (This effect works one time for 2 cards.) Choose a Basic Pokémon in your discard pile and switch it with 1 of your Basic Pokémon in play. Any attached cards, damage counters, Special Conditions, turns in play, and any other effects remain on the new Pokémon.
